<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Produtos</title>
</head>
<style>
    body {
        font-family: Arial;
        margin-top: 0;
    }

    input,
    button {
        margin: 5px;
        padding: 8px;
        font-size: 16px;
        border: 1px solid #ccc;
        border-radius: 5px;
    }

    header {
        position: fixed;
        display: flex;
        top: 0;
        left: 0;
        width: 100vw;
        height: 210px;
        background-color: rgb(170, 165, 165);
        z-index: 1000;
        padding: 0 8px;
        border: 1px solid #ccc;
    }

    #nav,
    h2 {
        padding: 0 8px;
    }

    #produtos {
        margin-top: 110px;
        margin-left: 55px;
    }

    .box {
        border: 1px solid #ccc;
        padding: 10px;
    }

    button {
        cursor: pointer;
        background-color: #28a745;
        color: white;
        border: none;
        border-radius: 5px;
    }

   #login {
        width: 50%;
        height: auto;
        margin-top: 0;
        display: flex;
        gap: 5px;
        align-items: center;
        flex-direction: row;
        justify-content: center;
        margin-left: 150px;
        margin-bottom: 100px;
    }
    .esquerda {
        width: 50%;
        align-items: flex-start;
        margin-left: 55px;

    }

    #nav {
        width: 200px;
        height: auto;
        display: flex;
        align-items: center;
        justify-content: flex-start;
        gap: 5px;
        text-decoration: none;
        margin-left: 60%;

    }

    a {
        margin-right: 10px;
        text-decoration: none;
        color: #4434da;
        font-size: large;
    }
     footer {
        width: 100%;
        height: 55px;
        position: fixed;
        bottom: 0;
        margin-left: 0;
        text-align: center;
        background-color: rgb(170, 165, 165);
    }

    .rodape {
        display: flex;
        justify-content: center;
        align-items: center;
    }
    @media screen and (min-width: 1226px) {
        #login {
            position: relative;
            width: 50%;
            display: flex;
            margin-right: 50px;
        }

        #nav {
            display: flex;
            justify-content: center;
        }

    }

    @media screen and (max-width: 1295px) {

        #usuario,
        #senha {
            width: 150px;
        }
    }
</style>

<body>

    <header>
        <div class="esquerda">
            <h1>🍺 Disque Bebidas</h1>
            <div id="nav">
                <a href="./index.html">Início</a>
                <a href="./produtos.html">Produtos</a>
                <a href="./historico.html">Histórico</a>
            </div>
            <h2>Produtos:</h2>
        </div>

        <div id="login">
            <strong>Login</strong>
            <input id="usuario" placeholder="Usuário">
            <strong>Senha:</strong>
            <input id="senha" type="password" placeholder="Senha">
            <button id="entrar">Entrar</button>
        </div>

    </header>

    <div id="produtos"></div>
    <div class="rodape">
        <footer>
            <p><b>Desenvolvido por:</b> José Wilson</p>
        </footer>
    </div>
</body>
<script src="script.js"></script>

</html>
